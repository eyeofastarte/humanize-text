# Humanize-Text v1.5.1 Configuration

[general]
# Target language for final output
target_language = "en"
# Log level: debug, info, warning, error
log_level = "info"

[api_keys]
# DeepSeek API key (required for Steps 1-2: 中文改写, 日语改写)
deepseek_api_key = ""
# Niutrans API key (required for Step 4: 二轮翻译)
niutrans_api_key = ""

[pipeline]
# DeepSeek model
model = "deepseek-chat"
# Temperature for LLM rewriting (1.3 recommended)
temperature = 1.3
# Intermediate language for the cross-engine translation hop (Step 3 → Step 4).
# Finnish ("fi") is the default — agglutinative morphology forces deep
# restructuring before reconstruction to the target language.
# Other tested options: "de" (German), "ko" (Korean)
intermediate_lang = "fi"
